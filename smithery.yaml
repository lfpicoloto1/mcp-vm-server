startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - mgc-api-key
    properties:
      mgc-api-key:
        type: string
        description: API key for accessing the VM API
  commandFunction: |
    (config) => ({
      command: 'python',
      args: ['main.py'],
      env: {
        VM_API_KEY: config.mgc-api-key,
        VM_API_URL: 'https://api.magalu.cloud/br-se1/compute'
      }
    }) 