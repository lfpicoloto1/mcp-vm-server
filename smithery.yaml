startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: API key for accessing the VM API
  commandFunction: |
    (config) => ({
      command: 'python',
      args: ['main.py'],
      env: {
        VM_API_KEY: config.apiKey,
        VM_API_URL: 'https://api.magalu.cloud/br-se1/compute'
      }
    }) 