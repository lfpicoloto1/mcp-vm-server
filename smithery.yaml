startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: API key for VM API authentication
  commandFunction: |
    (config) => ({
      command: 'python',
      args: ['main.py'],
      env: {
        VM_API_KEY: config.apiKey
      }
    }) 